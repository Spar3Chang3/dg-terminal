<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <link rel="preload" href="/assets/loading.gif" as="image" />
        <title>Terminal</title>
        <link rel="stylesheet" href="style.css" />
    </head>
    <body>
        <div
            id="terminal"
            class="terminal"
            tabindex="0"
            aria-label="Fake terminal"
        ></div>

        <input
            id="mobile-input"
            class="mobile-capture"
            type="text"
            autocapitalize="none"
            autocomplete="off"
            autocorrect="off"
            spellcheck="false"
        />

        <script src="script.js"></script>
    </body>
</html>
